<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKF Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      typography: {
        DEFAULT: {
          css: {
            '--tw-prose-body': '#a1a1aa',
            '--tw-prose-headings': '#fafafa',
            '--tw-prose-lead': '#a1a1aa',
            '--tw-prose-links': '#3b82f6',
            '--tw-prose-bold': '#fafafa',
            '--tw-prose-counters': '#71717a',
            '--tw-prose-bullets': '#71717a',
            '--tw-prose-hr': '#27272a',
            '--tw-prose-quotes': '#fafafa',
            '--tw-prose-quote-borders': '#3b82f6',
            '--tw-prose-captions': '#71717a',
            '--tw-prose-code': '#fafafa',
            '--tw-prose-pre-code': '#e8edf5',
            '--tw-prose-pre-bg': '#18181b',
            '--tw-prose-th': '#fafafa',
            '--tw-prose-td': '#a1a1aa',
            '--tw-prose-th-borders': '#27272a',
            '--tw-prose-td-borders': '#27272a',
          }
        }
      }
    }
  }
}
</script>
<style>
:root{--bg:#09090b;--surface:#18181b;--surface-2:#27272a;--surface-3:#3f3f46;--border:#27272a;--border-hover:#3f3f46;--text:#fafafa;--text-muted:#a1a1aa;--text-dim:#71717a;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--purple:#a855f7;--pink:#ec4899;--orange:#f97316;--teal:#14b8a6;--radius:8px;--radius-sm:6px;--shadow:0 1px 2px rgba(0,0,0,0.4);--sidebar-w:260px;--inspector-w:320px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
::selection{background:var(--accent);color:#fff}
.app{display:flex;height:100dvh}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:20;transition:transform .2s}
.sidebar-header{padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sidebar-logo{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sidebar-title{font-size:13px;font-weight:600;letter-spacing:-0.01em}
.sidebar-close{display:none;background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;margin-left:auto;padding:2px}
.sidebar-close:hover{color:var(--text)}
.sidebar-stats{padding:8px 14px;display:flex;gap:14px;font-size:11px;color:var(--text-dim);border-bottom:1px solid var(--border)}
.sidebar-stats strong{color:var(--text-muted);font-weight:600}
.sidebar-search{padding:8px 12px}
.sidebar-search input{width:100%;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:12px;outline:none;transition:border-color .15s}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-search input::placeholder{color:var(--text-dim)}
.sidebar-filters{padding:4px 12px 8px;display:flex;gap:4px;flex-wrap:wrap}
.filter-pill{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:3px 10px;border-radius:20px;cursor:pointer;font-size:11px;transition:all .15s}
.filter-pill:hover{border-color:var(--border-hover);color:var(--text)}
.filter-pill.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.sidebar-nodes{flex:1;overflow-y:auto;padding:2px 0}
.node-list{list-style:none}
.node-item{padding:5px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;border-left:2px solid transparent;transition:background .1s}
.node-item:hover{background:var(--surface-2)}
.node-item.selected{background:rgba(59,130,246,0.08);border-left-color:var(--accent)}
.node-icon{font-size:12px;flex-shrink:0;width:16px;text-align:center}
.node-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.node-id{font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.node-badge{font-size:9px;padding:1px 6px;border-radius:10px;background:var(--surface-2);color:var(--text-dim);flex-shrink:0}
.sidebar-footer{border-top:1px solid var(--border);flex-shrink:0}
.legend-toggle{width:100%;padding:6px 14px;background:none;border:none;color:var(--text-dim);font-size:11px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:6px}
.legend-toggle:hover{color:var(--text-muted)}
.legend-items{display:none;padding:4px 14px 8px;gap:4px;flex-wrap:wrap}
.legend-items.open{display:flex}
.legend-item{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--text-dim);cursor:pointer}
.legend-item:hover{color:var(--text-muted)}
.legend-dot{width:6px;height:6px;border-radius:2px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;gap:12px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface);min-height:40px}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:18px;cursor:pointer;padding:2px}
.topbar-title{font-size:13px;font-weight:600;letter-spacing:-0.01em}
.topbar-title span{color:var(--text-dim);font-weight:400;margin-left:4px}
.topbar-stats{margin-left:auto;display:flex;gap:14px;font-size:11px;color:var(--text-dim)}
.topbar-stats strong{color:var(--text-muted);font-weight:600}
.project-rail{display:flex;gap:6px;padding:6px 12px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--surface);scrollbar-width:none}
.project-rail::-webkit-scrollbar{display:none}
.project-card{flex-shrink:0;min-width:90px;padding:8px 12px;border-radius:var(--radius);background:var(--surface-2);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.project-card:hover{border-color:var(--border-hover);background:var(--surface-3)}
.project-card.active{border-color:var(--accent)}
.project-card .name{font-size:11px;font-weight:600;margin-bottom:2px}
.project-card .count{font-size:16px;font-weight:700;color:var(--text);line-height:1.1}
.project-card .label{font-size:9px;color:var(--text-dim)}
.project-card .dots{display:flex;gap:2px;margin-top:4px}
.project-card .pdot{width:5px;height:5px;border-radius:1px}
.workspace-body{flex:1;display:flex;overflow:hidden;position:relative}
.graph-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.graph-container{flex:1;position:relative;overflow:hidden}
#graph{width:100%;height:100%}
.tooltip{position:absolute;padding:6px 10px;border-radius:var(--radius-sm);background:var(--surface-2);border:1px solid var(--border);font-size:11px;pointer-events:none;display:none;box-shadow:var(--shadow);z-index:10}
.tooltip .tt-id{font-weight:600;color:var(--text)}
.tooltip .tt-type{color:var(--text-dim);margin-left:4px}
.inspector{width:0;overflow:hidden;transition:width .2s;background:var(--surface);border-left:1px solid var(--border);flex-shrink:0}
.inspector.open{width:var(--inspector-w);overflow-y:auto}
.inspector-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;position:sticky;top:0;background:var(--surface);z-index:2}
.inspector-close{background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;padding:2px 4px}
.inspector-close:hover{color:var(--text)}
.inspector-body{padding:12px 14px}
.inspector-empty{color:var(--text-dim);text-align:center;padding:40px 20px;font-size:12px;line-height:1.6}
.detail-row{font-size:12px;margin:4px 0;color:var(--text-muted);display:flex;gap:6px}
.detail-row .label{color:var(--text-dim);flex-shrink:0;min-width:60px}
.detail-row .value{color:var(--text);font-weight:500}
.detail-row code{background:var(--surface-2);padding:1px 5px;border-radius:3px;font-size:11px}
.links-section{margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.links-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.link-chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:3px 8px;border-radius:var(--radius-sm);margin:2px 4px 2px 0;cursor:pointer;transition:opacity .1s;border:1px solid transparent}
.link-chip:hover{opacity:0.8}
.content-section{margin-top:12px;padding-top:8px;border-top:1px solid var(--border)}
.content-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.badge{display:inline-block;font-size:10px;padding:1px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.3px;font-weight:500}
.badge.active{background:rgba(34,197,94,0.12);color:var(--green)}
.badge.open{background:rgba(59,130,246,0.12);color:var(--accent)}
.badge.closed{background:rgba(161,161,170,0.12);color:var(--text-dim)}
.badge.superseded{background:rgba(234,179,8,0.12);color:var(--yellow)}
.badge.expired{background:rgba(239,68,68,0.12);color:var(--red)}
.badge.in_progress{background:rgba(168,85,247,0.12);color:var(--purple)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:19}
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:12px}
.error{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--red);font-size:12px;gap:8px}
.error button{padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-2);color:var(--text);cursor:pointer;font-size:12px}
.error button:hover{background:var(--surface-3)}
@media(max-width:768px){.sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);width:280px;z-index:20}.sidebar.open{transform:translateX(0)}.sidebar-close{display:block}.sidebar-overlay.open{display:block}.hamburger{display:block}.topbar-stats{display:none}.project-rail{padding:6px 8px}.project-card{min-width:70px;padding:6px 10px}.project-card .count{font-size:14px}.inspector.open{width:100%;position:fixed;inset:0;z-index:30}}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">K</div>
      <div class="sidebar-title">OKF</div>
      <button class="sidebar-close" onclick="toggleSidebar()">&times;</button>
    </div>
    <div class="sidebar-stats">
      <span><strong id="totalNodes">-</strong> nodes</span>
      <span><strong id="totalEdges">-</strong> edges</span>
      <span><strong id="totalProjects">-</strong> projects</span>
    </div>
    <div class="sidebar-search">
      <input type="text" id="search" placeholder="Search..." oninput="filterNodes(this.value)">
    </div>
    <div class="sidebar-filters" id="filterBar">
      <button class="filter-pill active" onclick="setFilter('all')">All</button>
      <button class="filter-pill" onclick="setFilter('active')">Active</button>
      <button class="filter-pill" onclick="setFilter('open')">Open</button>
      <button class="filter-pill" onclick="setFilter('risk')">Risks</button>
    </div>
    <div class="sidebar-nodes" id="nodeList"><div class="loading">Loading...</div></div>
    <div class="sidebar-footer">
      <button class="legend-toggle" onclick="toggleLegend()">Legend &#9654;</button>
      <div class="legend-items" id="graphLegend"></div>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
      <div class="topbar-title">Workspace<span>Dashboard</span></div>
      <div class="topbar-stats">
        <span><strong id="visibleCount">0</strong> visible</span>
        <span><strong id="totalCount">-</strong> total</span>
      </div>
    </div>
    <div class="project-rail" id="projectRail"></div>
    <div class="workspace-body">
      <div class="graph-area">
        <div class="graph-container">
          <div id="graph"></div>
          <div class="tooltip" id="tooltip"></div>
        </div>
      </div>
      <aside class="inspector" id="inspector">
        <div class="inspector-header">
          <span id="inspectorTitle">Details</span>
          <button class="inspector-close" onclick="closeInspector()">&times;</button>
        </div>
        <div class="inspector-body" id="inspectorBody">
          <div class="inspector-empty">Select a node to view details</div>
        </div>
      </aside>
    </div>
  </div>
</div>
<script>
const API_BASE='/api/github';
const typeColors={decision:'#eab308',lesson:'#22c55e',risk:'#ef4444',task:'#3b82f6',document:'#a855f7',component:'#ec4899','agent-profile':'#6366f1','project-profile':'#14b8a6','project-status':'#f97316'};
const edgeColors={'relates-to':'#71717a',documents:'#a855f7',supersedes:'#eab308','caused-by':'#22c55e',blocks:'#ef4444',fulfills:'#3b82f6','depends-on':'#f97316','part-of':'#ec4899',contradicts:'#ef4444'};
const typeLabels={decision:'Decision',lesson:'Lesson',risk:'Risk',task:'Task',document:'Doc',component:'Component','agent-profile':'Agent','project-profile':'Profile','project-status':'Status',index:'Index','system-doc':'System',skill:'Skill',instruction:'Instruction','workspace-index':'Index'};
let nodes=[],allEdges=[],projectNames=[];
let currentFilter='all',selectedNode=null;
let graphNodeSel=null,graphLinkSel=null;
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('open')}
function closeInspector(){document.getElementById('inspector').classList.remove('open')}
function toggleLegend(){const el=document.getElementById('graphLegend');el.classList.toggle('open');const btn=document.querySelector('.legend-toggle');btn.innerHTML=el.classList.contains('open')?'Legend &#9660;':'Legend &#9654;'}
function escape(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getTypeIcon(t){const m={decision:'\uD83E\uDDE0',lesson:'\uD83D\uDCD6',risk:'\u26A0\uFE0F',task:'\u2705',document:'\uD83D\uDCC4',component:'\uD83C\uDFD7\uFE0F','agent-profile':'\uD83E\uDD16','project-profile':'\uD83D\uDCCB','project-status':'\uD83D\uDCCA',index:'\uD83D\uDCC1','system-doc':'\uD83D\uDD27',skill:'\uD83D\uDEE0\uFE0F',instruction:'\uD83D\uDCDD','workspace-index':'\uD83D\uDCCC'};return m[t]||'\uD83D\uDCC4'}
function getProjectColor(n){const c=['#3b82f6','#a855f7','#22c55e','#eab308','#ef4444','#ec4899','#14b8a6'];let h=0;for(let i=0;i<n.length;i++)h=((h<<5)-h)+n.charCodeAt(i);return c[Math.abs(h)%c.length]}
async function fetchGitHub(path){const r=await fetch(`${API_BASE}?path=${encodeURIComponent(path)}`);if(!r.ok)throw new Error(`API error: ${r.status}`);return r.json()}
async function loadGraph(){try{const data=await fetchGitHub('graph.json');const decoded=typeof data.content==='string'?JSON.parse(data.content):data;nodes=decoded.nodes||[];allEdges=decoded.edges||[];const projects={};nodes.forEach(n=>{if(n.project){if(!projects[n.project])projects[n.project]={name:n.project,node_count:0,by_type:{}};projects[n.project].node_count++;projects[n.project].by_type[n.type]=(projects[n.project].by_type[n.type]||0)+1}});projectNames=Object.values(projects);document.getElementById('totalNodes').textContent=nodes.length;document.getElementById('totalEdges').textContent=allEdges.length;document.getElementById('totalProjects').textContent=projectNames.length;document.getElementById('totalCount').textContent=nodes.length;renderProjectCards();renderLegend();renderList(nodes);renderGraph()}catch(e){document.getElementById('nodeList').innerHTML=`<div class="error">Failed to load<div>${escape(e.message)}</div><button onclick="loadGraph()">Retry</button></div>`}}
function renderProjectCards(){const rail=document.getElementById('projectRail');rail.innerHTML=`<div class="project-card" onclick="setFilter('all')" style="border-color:var(--border-hover)"><div class="name" style="color:var(--text-muted)">All</div><div class="count">${nodes.length}</div><div class="label">nodes</div></div>`+projectNames.map(p=>{const color=getProjectColor(p.name);const dots=Object.entries(p.by_type||{}).slice(0,4).map(([t])=>`<span class="pdot" style="background:${typeColors[t]||'#71717a'}" title="${t}"></span>`).join('');return`<div class="project-card" onclick="setFilter('project:${p.name}')"><div class="name" style="color:${color}">${p.name}</div><div class="count">${p.node_count}</div><div class="label">nodes</div><div class="dots">${dots}</div></div>`}).join('')}
function renderLegend(){const used={};nodes.forEach(n=>{used[n.type]=(used[n.type]||0)+1});document.getElementById('graphLegend').innerHTML=Object.entries(used).sort().map(([t])=>`<span class="legend-item" onclick="setFilter('type:${t}')"><span class="legend-dot" style="background:${typeColors[t]||'#71717a'}"></span>${typeLabels[t]||t}</span>`).join(' ')}
function renderList(list){document.getElementById('nodeList').innerHTML='<ul class="node-list">'+list.map(n=>{const s=(n.id+' '+(n.project||'')+' '+n.type+' '+(n.status||'')).toLowerCase();return`<li class="node-item" data-id="${n.id}" data-project="${n.project||''}" data-type="${n.type}" data-status="${n.status}" data-search="${s}" onclick="selectNode('${n.id}')"><span class="node-icon">${getTypeIcon(n.type)}</span><span class="node-dot" style="background:${typeColors[n.type]||'#71717a'}"></span><span class="node-id">${n.id}</span><span class="node-badge">${n.project||''}</span></li>`}).join('')+'</ul>';updateStats()}
function updateStats(){const v=document.querySelectorAll('.node-item:not([style*="display: none"])');document.getElementById('visibleCount').textContent=v.length}
function filterNodes(q){const items=document.querySelectorAll('.node-item');const s=(q||'').toLowerCase();items.forEach(i=>{const matchFilter=matchesFilter(i.dataset);const matchSearch=!s||i.dataset.search.includes(s);i.style.display=(matchFilter&&matchSearch)?'':'none'});updateStats()}
function matchesFilter(d){if(currentFilter==='all')return true;if(currentFilter==='active')return d.status==='active';if(currentFilter==='open')return d.type==='task'&&d.status==='open';if(currentFilter==='risk')return d.type==='risk';if(currentFilter.startsWith('project:'))return d.project===currentFilter.slice(8);if(currentFilter.startsWith('type:'))return d.type===currentFilter.slice(5);return true}
function setFilter(f){document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.filter-pill').forEach(b=>{if(b.textContent.toLowerCase()===f.toLowerCase()||(f.startsWith('project:')&&b.textContent.toLowerCase()===f.slice(8).toLowerCase()))b.classList.add('active')});currentFilter=f;filterNodes(document.getElementById('search').value);document.querySelectorAll('.project-card').forEach(c=>c.classList.remove('active'));if(f==='all')document.querySelectorAll('.project-card')[0]?.classList.add('active');else if(f.startsWith('project:')){const n=f.slice(8);document.querySelectorAll('.project-card').forEach(c=>{if(c.querySelector('.name')?.textContent===n)c.classList.add('active')});document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'))}applyGraphFilter()}
function applyGraphFilter(){if(!graphNodeSel||!graphLinkSel)return;graphNodeSel.select('circle').attr('opacity',d=>matchesFilter({project:d.project||'',type:d.type||'',status:d.status||''})?1:0.06);graphNodeSel.selectAll('text').attr('opacity',d=>matchesFilter({project:d.project||'',type:d.type||'',status:d.status||''})?1:0.06);graphLinkSel.attr('opacity',d=>{const s=matchesFilter({project:d.source.project||'',type:d.source.type||'',status:d.source.status||''});const t=matchesFilter({project:d.target.project||'',type:d.target.type||'',status:d.target.status||''});return(s&&t)?0.3:0.02})}
function renderMarkdown(md){let h='';let lines=md.split('\n');let inCode=false,buf=[];for(let l of lines){if(l.startsWith('```')){if(inCode){h+='<pre><code>'+buf.join('\n')+'</code></pre>';buf=[]}inCode=!inCode;continue}if(inCode){buf.push(l);continue}if(!l.trim()){h+='<br>';continue}if(/^#{1,6}\s/.test(l)){const n=l.match(/^(#+)\s/)[1].length;h+='<h'+n+'>'+l.replace(/^#+\s/,'')+'</h'+n+'>';continue}if(/^- /.test(l)){h+='<li>'+l.replace(/^- /,'')+'</li>';continue}if(/^\d+\.\s/.test(l)){h+='<li>'+l.replace(/^\d+\.\s/,'')+'</li>';continue}if(/^---/.test(l)){h+='<hr>';continue}h+='<p>'+l.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>')+'</p>'}if(inCode)h+='<pre><code>'+buf.join('\n')+'</code></pre>';return h}
async function loadFileContent(fp,el){if(!fp){el.innerHTML='';return}el.innerHTML='<div style="color:var(--text-dim);padding:4px 0">Loading...</div>';try{const r=await fetch(`${API_BASE}?path=${encodeURIComponent(fp)}`);if(!r.ok)throw new Error('HTTP '+r.status);const data=await r.json();const t=typeof data.content==='string'?data.content:JSON.stringify(data);el.innerHTML='<div class="prose prose-invert prose-sm max-w-none">'+renderMarkdown(t)+'</div>'}catch(e){el.innerHTML='<div style="color:var(--red);font-size:11px">'+escape(e.message)+'</div>'}}
async function selectNode(id){selectedNode=id;document.querySelectorAll('.node-item').forEach(i=>i.classList.toggle('selected',i.dataset.id===id));const node=nodes.find(n=>n.id===id);if(!node)return;const insp=document.getElementById('inspector');insp.classList.add('open');document.getElementById('inspectorTitle').textContent=getTypeIcon(node.type)+' '+node.id;const related=allEdges.filter(e=>e.source===id||e.target===id);let html=`<div style="margin-bottom:10px"><span class="badge ${node.status||'active'}">${node.status||'active'}</span><span style="font-size:11px;color:var(--text-dim);margin-left:8px">${node.type}</span></div>`;html+=`<div class="detail-row"><span class="label">Project</span><span class="value">${node.project||'<span style="color:var(--text-dim)">(global)</span>'}</span></div>`;if(node.file)html+=`<div class="detail-row"><span class="label">File</span><span class="value"><code>${escape(node.file)}</code></span></div>`;if(node.freshness)html+=`<div class="detail-row"><span class="label">Fresh</span><span class="value">${node.freshness}</span></div>`;if(node.verified)html+=`<div class="detail-row"><span class="label">Verified</span><span class="value">${node.verified}</span></div>`;if(node.expires)html+=`<div class="detail-row"><span class="label">Expires</span><span class="value">${node.expires}</span></div>`;if(related.length){html+=`<div class="links-section"><div class="links-label">Links (${related.length})</div>`;html+=related.map(e=>{const other=e.source===id?e.target:e.source;const c=edgeColors[e.type]||'#71717a';return`<span class="link-chip" style="background:${c}15;border-color:${c}33;color:${c}" onclick="selectNode('${other}')">${e.type} → ${other}</span>`}).join('');html+='</div>'}html+=`<div class="content-section"><div class="content-label">Content</div><div id="nodeContent"></div></div>`;document.getElementById('inspectorBody').innerHTML=html;loadFileContent(node.file,document.getElementById('nodeContent'));if(window.innerWidth<=768){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open')}}
function renderGraph(){const container=document.getElementById('graph');const w=container.clientWidth,h=container.clientHeight;d3.select('#graph').selectAll('*').remove();const svg=d3.select('#graph').append('svg').attr('width',w).attr('height',h).style('background','var(--bg)');const defs=svg.append('defs');defs.append('pattern').attr('id','grid').attr('width',24).attr('height',24).attr('patternUnits','userSpaceOnUse').append('path').attr('d','M 24 0 L 0 0 0 24').attr('fill','none').attr('stroke','var(--surface-2)').attr('stroke-width',0.4);svg.append('rect').attr('width','100%').attr('height','100%').attr('fill','url(#grid)').attr('pointer-events','none');const g=svg.append('g');const zoom=d3.zoom().scaleExtent([0.1,4]).on('zoom',e=>g.attr('transform',e.transform));svg.call(zoom);const skip=['system-doc','skill','instruction','index','workspace-index'];const active=nodes.filter(n=>!skip.includes(n.type));const ids=new Set(active.map(n=>n.id));const edges=allEdges.filter(e=>ids.has(e.source)&&ids.has(e.target));const sim=d3.forceSimulation(active).force('link',d3.forceLink(edges).id(d=>d.id).distance(100).strength(0.12)).force('charge',d3.forceManyBody().strength(-160)).force('center',d3.forceCenter(w/2,h/2)).force('collision',d3.forceCollide().radius(24));const link=g.append('g').selectAll('line').data(edges).join('line').attr('stroke',d=>(edgeColors[d.type]||'#71717a')+'30').attr('stroke-width',0.8).attr('stroke-dasharray',d=>d.type==='relates-to'?'3,3':'none');graphLinkSel=link;const node=g.append('g').selectAll('g').data(active).join('g').call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null})).on('click',(e,d)=>selectNode(d.id)).on('mouseenter',(e,d)=>{const tt=document.getElementById('tooltip');tt.innerHTML=`<span class="tt-id">${d.id}</span><span class="tt-type">${d.type}</span>`;tt.style.display='block';tt.style.left=(e.offsetX+12)+'px';tt.style.top=(e.offsetY-10)+'px'}).on('mousemove',(e)=>{const tt=document.getElementById('tooltip');tt.style.left=(e.offsetX+12)+'px';tt.style.top=(e.offsetY-10)+'px'}).on('mouseleave',()=>{document.getElementById('tooltip').style.display='none'});graphNodeSel=node;node.append('circle').attr('r',d=>d.type==='task'?6:d.type==='decision'?8:d.type==='risk'?6:5).attr('fill',d=>(typeColors[d.type]||'#71717a')+'88').attr('stroke',d=>typeColors[d.type]||'#71717a').attr('stroke-width',1.5).attr('cursor','pointer');node.append('text').text(d=>getTypeIcon(d.type)).attr('x',7).attr('y',3).attr('font-size',9).attr('pointer-events','none');sim.on('tick',()=>{link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);node.attr('transform',d=>`translate(${d.x},${d.y})`)})}
loadGraph();
window.addEventListener('resize',()=>{const s=document.querySelector('#graph svg');if(s){s.setAttribute('width',document.getElementById('graph').clientWidth);s.setAttribute('height',document.getElementById('graph').clientHeight)}});
</script>
