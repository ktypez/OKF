name: Deploy OKF Site

on:
  push:
    branches: [main]
    paths:
      - 'projects/**'
      - 'system/**'
      - 'site/**'
      - 'scripts/build-site.js'
      - 'SETUP.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install site dependencies
        run: npm install
        working-directory: site

      - name: Link Vercel project
        run: npx vercel link --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_xWYnJlpmKenca1NC2UI7VQzV
          VERCEL_PROJECT_ID: prj_RpBHnpmfVfWY7xq8AmH6FUScEDRI

      - name: Build site from KB
        run: node scripts/build-site.js

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_xWYnJlpmKenca1NC2UI7VQzV
          VERCEL_PROJECT_ID: prj_RpBHnpmfVfWY7xq8AmH6FUScEDRI
